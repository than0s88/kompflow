# =============================================================
# Kompflow — single-command stack
#   docker compose up
# =============================================================
# Brings up:
#   - db        :5432   Postgres 16
#   - soketi    :6001   Pusher-protocol-compatible WebSocket server (self-hosted)
#   - api       :3001   NestJS (auto-runs prisma db push on boot)
#   - web       :5173   React SPA served by nginx
#
# All defaults are baked in. No .env file required.
# =============================================================

name: kompflow

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kompflow
      POSTGRES_PASSWORD: kompflow
      POSTGRES_DB: kompflow
    volumes:
      - db_data:/var/lib/postgresql/data
    # Not exposed on the host by default — keep the demo free of port conflicts
    # with any local Postgres install. Add a "ports" mapping if you want direct
    # DB access from your host.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kompflow -d kompflow"]
      interval: 3s
      timeout: 3s
      retries: 20

  soketi:
    image: quay.io/soketi/soketi:1.6-16-alpine
    restart: unless-stopped
    environment:
      SOKETI_DEBUG: "0"
      SOKETI_DEFAULT_APP_ID: kompflow-app
      SOKETI_DEFAULT_APP_KEY: kompflow-key
      SOKETI_DEFAULT_APP_SECRET: kompflow-secret
      SOKETI_DEFAULT_APP_ENABLE_CLIENT_MESSAGES: "false"
    ports:
      - "6001:6001"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      soketi:
        condition: service_started
    # Pull GOOGLE_*/SMTP_* and any other creds from apps/api/.env if it exists.
    # The "environment:" block below overrides DB and Soketi-related vars so the
    # local Postgres + Soketi stack always wins over any cloud values in .env.
    env_file:
      - path: apps/api/.env
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://kompflow:kompflow@db:5432/kompflow?schema=public
      JWT_SECRET: demo-secret-do-not-use-in-production-9c7f2e0a
      JWT_EXPIRES_IN: 7d
      PORT: "3001"
      WEB_ORIGIN: http://localhost:5173
      COOKIE_DOMAIN: localhost
      COOKIE_SECURE: "false"
      # Self-hosted Pusher via Soketi — gives the demo working realtime with no external account
      PUSHER_APP_ID: kompflow-app
      PUSHER_KEY: kompflow-key
      PUSHER_SECRET: kompflow-secret
      PUSHER_CLUSTER: mt1
      PUSHER_HOST: soketi
      PUSHER_PORT: "6001"
      PUSHER_USE_TLS: "false"
      # OAuth env vars are intentionally left unset — strategies fall back to
      # "unset" placeholders and just log a warning. Setting them to "" would
      # crash passport-google-oauth20 on boot.
      UPLOAD_DIR: /var/lib/kompflow/uploads
    volumes:
      - uploads_data:/var/lib/kompflow/uploads
    ports:
      - "3001:3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
        VITE_PUSHER_KEY: kompflow-key
        VITE_PUSHER_CLUSTER: mt1
        VITE_PUSHER_HOST: localhost
        VITE_PUSHER_PORT: "6001"
        VITE_PUSHER_USE_TLS: "false"
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  db_data:
  uploads_data:
